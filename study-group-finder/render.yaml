services:
  - type: web
    name: study-group-finder
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_CONFIG
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: study-group-finder-db
          property: connectionString

databases:
  - name: study-group-finder-db
    plan: free
    databaseName: study_group_finder
    user: study_group_finder_user
